<script>
// ── REGISTER SERVICE WORKER ─────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(console.error);
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data && e.data.type === 'DO_SYNC') attemptSync();
  });
}

// ── STATE ────────────────────────────────────────────────────
const S = { staffId:'', pin:'', staff:null, loc:null, locStatus:'idle' };

window.addEventListener('load', async () => {
  getLocation();
  // Show loading while we sync staff data
  document.getElementById('card').innerHTML =
    '<div style="text-align:center;padding:24px;color:#6b8c72">' +
    '<div class="sp" style="margin:0 auto 12px"></div>' +
    '<div style="font-size:.9rem">Loading staff data…</div>' +
    '</div>';

  if (navigator.onLine) {
    try {
      await syncStaffFromServer();
    } catch(e) {
      console.warn('Initial staff sync failed:', e);
    }
  }

  // Check if we have any staff at all
  const staff = await getAllActiveStaff();
  if (staff.length === 0 && navigator.onLine) {
    // Try one more time
    try { await syncStaffFromServer(); } catch(e) {}
  }

  const staffCount = (await getAllActiveStaff()).length;
  renderLogin(staffCount === 0 && !navigator.onLine
    ? 'No internet — using cached data. Connect once to load staff.'
    : null);
});

// ── LOCATION ─────────────────────────────────────────────────
// Two verified locations - update coords as needed
const LOCATIONS = [
  { name:'Wellness Home',   lat:26.6675224, lng:88.0033636 },
  { name:'Ayurveda Clinic', lat:26.6675224, lng:88.0033636 }, // ← update
];
const RADIUS_M = 250;

function getLocation() {
  if (!navigator.geolocation) { S.locStatus = 'unavailable'; return; }
  S.locStatus = 'checking';
  navigator.geolocation.getCurrentPosition(
    p => { S.loc = { lat:p.coords.latitude, lng:p.coords.longitude }; S.locStatus='ok'; updateLocDot(); },
    () => { S.locStatus = 'denied'; updateLocDot(); },
    { enableHighAccuracy:true, timeout:12000, maximumAge:0 }
  );
}

function haversine(lat1,lng1,lat2,lng2) {
  const R=6371000, p1=lat1*Math.PI/180, p2=lat2*Math.PI/180;
  const dp=(lat2-lat1)*Math.PI/180, dl=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function checkLocation() {
  if (!S.loc) return { ok:false, msg:'Location not available. Please allow GPS access.' };
  for (const loc of LOCATIONS) {
    const d = haversine(S.loc.lat, S.loc.lng, loc.lat, loc.lng);
    if (d <= RADIUS_M) return { ok:true, name:loc.name, dist:Math.round(d) };
  }
  const dists = LOCATIONS.map(l => `${l.name} (${Math.round(haversine(S.loc.lat,S.loc.lng,l.lat,l.lng))}m)`);
  return { ok:false, msg:'You must be at the centre.\n' + dists.join(' | ') };
}

function updateLocDot() {
  const d = document.getElementById('locDot');
  const t = document.getElementById('locTxt');
  if (!d) return;
  const cls = S.locStatus==='ok'?'ok':S.locStatus==='checking'?'chk':'bad';
  d.className = 'loc-dot ' + cls;
  t.textContent = S.locStatus==='ok' ? 'Location found' :
                  S.locStatus==='checking' ? 'Getting location…' : 'Location not available';
}

// ── LOGIN ─────────────────────────────────────────────────────
function renderLogin(err) {
  S.pin=''; S.staff=null;
  document.getElementById('card').innerHTML = `
    <div class="lbl">Staff ID</div>
    <input class="inp" id="fId" type="text" placeholder="e.g. S001" autocomplete="off"
      autocapitalize="characters" spellcheck="false" oninput="this.value=this.value.toUpperCase()"/>
    <div class="lbl">PIN</div>
    <input class="inp" id="fPin" type="password" inputmode="numeric" placeholder="4-digit PIN" maxlength="6"/>
    <button class="btn btn-green" onclick="doLogin()">Sign In</button>
    ${err?`<div style="background:#fdecea;color:#c0392b;border-radius:8px;padding:9px 12px;font-size:.82rem;margin-top:10px;text-align:center">${err}</div>`:''}
  `;
  document.getElementById('fId').focus();
  document.getElementById('fPin').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  document.getElementById('fId').addEventListener('keydown',  e => { if(e.key==='Enter') document.getElementById('fPin').focus(); });
}

async function doLogin() {
  const id  = (document.getElementById('fId').value||'').trim().toUpperCase();
  const pin = (document.getElementById('fPin').value||'').trim();
  if (!id||!pin) { renderLogin('Enter both Staff ID and PIN.'); return; }

  showOv('Signing in…');
  const staff = await getStaffByIdAndPin(id, pin);
  hideOv();
  if (!staff) { renderLogin('Wrong Staff ID or PIN. Try again.'); return; }

  S.staffId = id; S.pin = pin; S.staff = staff;
  await renderAttendance();
}

// ── ATTENDANCE SCREEN ─────────────────────────────────────────
async function renderAttendance() {
  const status = await computeCurrentStatus(S.staffId);
  const stats  = await computeTodayStats(S.staffId);
  const bsToday = formatBs(new Date(), true);

  const icon = status==='WORKING'?'🟢':status==='OUTSIDE'?'🟡':'🔴';
  const hrs  = Math.floor(stats.workMins/60), mins = stats.workMins%60;

  let btns = '';
  if (status==='OFF') {
    btns = `<div class="action-grid">
      <button class="btn-action btn-start" onclick="doAction('START_DAY')">
        <span class="icon">🌅</span><span>Check In</span><span class="lbl2">Start your day</span>
      </button></div>`;
  } else if (status==='WORKING') {
    btns = `<div class="action-grid two-col">
      <button class="btn-action btn-tempout" onclick="doAction('TEMP_OUT')">
        <span class="icon">🚶</span><span>Temp Out</span><span class="lbl2">Short break</span>
      </button>
      <button class="btn-action btn-endday" onclick="doAction('END_DAY')">
        <span class="icon">🌙</span><span>End Day</span><span class="lbl2">Going home</span>
      </button></div>`;
  } else if (status==='OUTSIDE') {
    btns = `<div class="action-grid two-col">
      <button class="btn-action btn-return" onclick="doAction('RETURN')">
        <span class="icon">👋</span><span>I'm Back</span><span class="lbl2">Returned</span>
      </button>
      <button class="btn-action btn-endday" onclick="doAction('END_DAY')">
        <span class="icon">🌙</span><span>End Day</span><span class="lbl2">Emergency</span>
      </button></div>`;
  }

  const locStatus = S.locStatus==='ok'?'ok':S.locStatus==='checking'?'chk':'bad';

  document.getElementById('card').innerHTML = `
    <div class="usr-name">${esc(S.staff.name)}</div>
    <div class="usr-sub">ID: ${esc(S.staffId)} · BS ${bsToday}</div>
    <span class="sbadge s-${status}">${icon} ${status}</span>
    <div class="stats">
      <div class="stat"><div class="stat-v">${stats.firstEntry||'--'}</div><div class="stat-l">Entry</div></div>
      <div class="stat"><div class="stat-v">${stats.lastExit||'--'}</div><div class="stat-l">Exit</div></div>
      <div class="stat"><div class="stat-v">${hrs}h ${mins}m</div><div class="stat-l">Today</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;font-size:.72rem;color:#6b8c72;margin-bottom:14px">
      <span style="width:8px;height:8px;border-radius:50%;background:${locStatus==='ok'?'#2e8b57':locStatus==='chk'?'#f0a500':'#e74c3c'};display:inline-block" id="locDot"></span>
      <span id="locTxt">${S.locStatus==='ok'?'Location found':S.locStatus==='checking'?'Getting location…':'Location not available'}</span>
    </div>
    ${btns}
    <button class="btn btn-outline" onclick="renderLogin()">🔒 Sign out</button>
  `;
}

// ── RECORD ACTION ─────────────────────────────────────────────
async function doAction(action) {
  if (S.locStatus==='checking') {
    showToast('⏳ Still getting GPS, please wait…', true); return;
  }
  const locCheck = checkLocation();
  if (!locCheck.ok) { showToast('📍 ' + locCheck.msg, true); return; }

  showOv('Recording…');

  const tz      = 'Asia/Kathmandu';
  const now     = new Date();
  const dateStr = now.toLocaleDateString('en-CA', { timeZone: tz });
  const logId   = 'L' + now.getTime() + '_' + S.staffId;

  const currentStatus = await computeCurrentStatus(S.staffId);
  const statusAfter   = { START_DAY:'WORKING', TEMP_OUT:'OUTSIDE', RETURN:'WORKING', END_DAY:'OFF' }[action] || 'OFF';

  const log = {
    logId, timestamp: now.toISOString(), staffId: S.staffId,
    staffName: S.staff.name, email: S.staff.email || '',
    action, statusBefore: currentStatus, statusAfter,
    location: locCheck.name, date: dateStr,
    synced: false, manualEntry: false,
  };

  await dbPut('logs', log);
  hideOv();

  const msgs = {
    START_DAY: `✅ Day started — good morning, ${S.staff.name}!`,
    TEMP_OUT : '🚶 Temp out recorded.',
    RETURN   : `👋 Welcome back, ${S.staff.name}!`,
    END_DAY  : `🌙 Day ended. Great work, ${S.staff.name}!`,
  };
  showToast(msgs[action] || 'Recorded!', false);

  // Show offline badge if not online
  if (!navigator.onLine) {
    showToast('💾 Saved offline — will sync when connected', false);
  } else {
    attemptSync(); // try to sync immediately
  }

  await renderAttendance();
}

// ── HELPERS ───────────────────────────────────────────────────
function showOv(t)  { document.getElementById('ov-txt').textContent=t; document.getElementById('ov').classList.add('show'); }
function hideOv()   { document.getElementById('ov').classList.remove('show'); }
function showToast(msg, isErr) {
  const t = document.getElementById('toast');
  document.getElementById('t-msg').textContent = msg;
  t.className = 'toast' + (isErr?' err':'') + ' show';
  clearTimeout(window._tt);
  window._tt = setTimeout(() => { t.className = 'toast'+(isErr?' err':''); }, 4500);
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
